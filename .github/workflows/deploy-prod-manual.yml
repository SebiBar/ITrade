name: Deploy Production (manual)

on:
  workflow_dispatch:
    inputs:
      github_environment:
        description: "GitHub environment name"
        required: true
        default: "production"
      environment_name:
        description: "azd environment name"
        required: true
        default: "itrade-pl"
      azure_location:
        description: "Azure location"
        required: true
        default: "polandcentral"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZD_ENV_NAME: ${{ inputs.environment_name }}
      AZD_LOCATION: ${{ inputs.azure_location }}
      PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      MAILJET_KEY: ${{ secrets.MAILJET_KEY }}
      MAILJET_SECRET: ${{ secrets.MAILJET_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Validate required secrets
        run: |
          test -n "$AZURE_SUBSCRIPTION_ID" || (echo "Missing AZURE_SUBSCRIPTION_ID" && exit 1)
          test -n "$AZURE_TENANT_ID" || (echo "Missing AZURE_TENANT_ID" && exit 1)
          test -n "$AZURE_CLIENT_ID" || (echo "Missing AZURE_CLIENT_ID" && exit 1)
          test -n "$PRODUCTION_API_BASE_URL" || (echo "Missing PRODUCTION_API_BASE_URL" && exit 1)
          test -n "$JWT_SECRET" || (echo "Missing JWT_SECRET" && exit 1)
          test -n "$MAILJET_KEY" || (echo "Missing MAILJET_KEY" && exit 1)
          test -n "$MAILJET_SECRET" || (echo "Missing MAILJET_SECRET" && exit 1)

      - name: Install Azure Developer CLI
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Developer CLI login
        run: azd auth login --client-id "$AZURE_CLIENT_ID" --tenant-id "$AZURE_TENANT_ID" --federated-credential-provider github --no-prompt

      - name: Ensure azd environment exists
        run: azd env select "$AZD_ENV_NAME" --no-prompt || azd env new "$AZD_ENV_NAME" --subscription "$AZURE_SUBSCRIPTION_ID" --location "$AZD_LOCATION" --no-prompt

      - name: Configure azd environment values
        run: |
          azd env set --environment "$AZD_ENV_NAME" Database__MigrateOnStartup true
          azd env set --environment "$AZD_ENV_NAME" Urls__ApiBase "$PRODUCTION_API_BASE_URL"
          azd env set --environment "$AZD_ENV_NAME" Jwt__Secret "$JWT_SECRET"
          azd env set --environment "$AZD_ENV_NAME" MailJet__Key "$MAILJET_KEY"
          azd env set --environment "$AZD_ENV_NAME" MailJet__Secret "$MAILJET_SECRET"

      - name: Provision and deploy
        run: azd up --environment "$AZD_ENV_NAME" --subscription "$AZURE_SUBSCRIPTION_ID" --location "$AZD_LOCATION" --no-prompt
