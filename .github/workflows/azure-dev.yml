# Run when commits are pushed to master
on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - master

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_PG_USER: ${{ secrets.PG_USER }}
      AZURE_PG_PASS: ${{ secrets.PG_PASS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      Jwt__Secret: ${{ secrets.JWT_SECRET }}
      MAILJET_KEY: ${{ secrets.MAILJET_KEY }}
      MailJet__Key: ${{ secrets.MAILJET_KEY }}
      MAILJET_SECRET: ${{ secrets.MAILJET_SECRET }}
      MailJet__Secret: ${{ secrets.MAILJET_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            8.x
            9.x
            10.x

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Validate required config
        run: |
          test -n "$AZURE_ENV_NAME" || (echo "Missing AZURE_ENV_NAME" && exit 1)
          test -n "$AZURE_LOCATION" || (echo "Missing AZURE_LOCATION" && exit 1)
          test -n "$JWT_SECRET" || (echo "Missing JWT_SECRET" && exit 1)
          test -n "$MAILJET_KEY" || (echo "Missing MAILJET_KEY" && exit 1)
          test -n "$MAILJET_SECRET" || (echo "Missing MAILJET_SECRET" && exit 1)

      - name: Ensure azd environment exists
        run: azd env select "$AZURE_ENV_NAME" --no-prompt || azd env new "$AZURE_ENV_NAME" --subscription "$AZURE_SUBSCRIPTION_ID" --location "$AZURE_LOCATION" --no-prompt

      - name: Configure azd environment values
        run: |
          azd env set --environment "$AZURE_ENV_NAME" Database__MigrateOnStartup true
          azd env set --environment "$AZURE_ENV_NAME" Jwt__Secret "$JWT_SECRET"
          azd env set --environment "$AZURE_ENV_NAME" MailJet__Key "$MAILJET_KEY"
          azd env set --environment "$AZURE_ENV_NAME" MailJet__Secret "$MAILJET_SECRET"


      - name: Provision Infrastructure
        run: azd provision --environment "$AZURE_ENV_NAME" --no-prompt
        env:
          AZURE_DB_PASSWORD: ${{ secrets.AZURE_DB_PASSWORD }}

      - name: Deploy Application
        run: azd deploy --environment "$AZURE_ENV_NAME" --no-prompt
        env:
          AZURE_DB_PASSWORD: ${{ secrets.AZURE_DB_PASSWORD }}
        
